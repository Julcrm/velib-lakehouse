version: 2

models:
  - name: velib_silver
    description: >
      Données Vélib nettoyées, enrichies avec calcul de deltas et de vitesse de vidage.
      Ce modèle transforme les snapshots bruts (Bronze) en données prêtes pour l'analyse (Gold).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ station_code, last_reported ]

    columns:
      - name: station_code
        description: "Identifiant unique de la station"
        tests:
          - not_null

      - name: station_name
        description: "Nom officiel de la station"
        tests:
          - not_null

      - name: bikes_available
        description: "Nombre total de vélos disponibles"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

      - name: capacity
        description: "Capacité totale de la station"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              config:
                severity: warn

      - name: last_reported
        description: "Horodatage de la dernière activité de la station"
        tests:
          - not_null

      - name: is_renting
        description: "La station autorise-t-elle la location ?"
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: is_returning
        description: "La station autorise-t-elle le dépôt ?"
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: depletion_rate_per_minute
        description: "Vitesse de vidage/remplissage — NULL pour le premier snapshot"
        tests:
          - dbt_utils.accepted_range:
              min_value: -50
              max_value: 50
              config:
                severity: warn

      - name: bikes_delta
        description: "Différence de vélos par rapport au snapshot précédent — NULL pour le premier snapshot"
        tests:
          - dbt_utils.accepted_range:
              min_value: -100
              max_value: 100
              config:
                severity: warn