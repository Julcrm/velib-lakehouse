version: 2

models:
  - name: velib_silver
    description: >
      Cleaned and enriched Vélib data with bike delta and depletion rate calculations.
      Transforms raw Bronze snapshots into analysis-ready data for the Gold layer.

    columns:
      - name: station_code
        description: "Unique station identifier"
        tests:
          - not_null

      - name: station_name
        description: "Official station name"
        tests:
          - not_null

      - name: bikes_available
        description: "Total number of bikes currently available at the station"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: capacity
        description: "Total docking capacity of the station"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
              config:
                severity: warn

      - name: last_reported
        description: "Timestamp of the last station activity report"
        tests:
          - not_null

      - name: is_renting
        description: "Whether the station is currently accepting bike rentals"
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: is_returning
        description: "Whether the station is currently accepting bike returns"
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: depletion_rate_per_minute
        description: "Depletion/refill speed in bikes per minute — NULL for the first snapshot"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -50
                max_value: 50
              config:
                severity: warn

      - name: bikes_delta
        description: "Change in bike count since the previous snapshot — NULL for the first snapshot"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -100
                max_value: 100
              config:
                severity: warn
