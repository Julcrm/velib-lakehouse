# velib-lakehouse/docker-compose.yml
version: "3.8"

services:
  velib-lakehouse:
    build: .
    container_name: velib-lakehouse
    expose:
      - "4000"
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
    env_file:
      - .env
    networks:
      - coolify

networks:
  coolify:
    external: true
    name: coolify